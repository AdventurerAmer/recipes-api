name: recipes
services:
  main-mongo:
    image: mongo:8
    hostname: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - main-mongo-data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: >
        echo "try { rs.status() } catch (err) { 
          rs.initiate({
            _id: 'rs0', 
            members: [{ _id: 0, host: 'host.docker.internal:27017' }]
          }) 
        }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 10s
      retries: 30
  main-redis:
    image: redis:8.6
    restart: unless-stopped              
    ports:
      - "6379:6379"              
    volumes:
      - main-redis-data:/data
  sessions-redis:
    image: redis:8.6
    restart: unless-stopped              
    ports:
      - "6380:6379"              
    volumes:
      - sessions-redis-data:/data
  redis-insight:
    image: redis/redisinsight:3.2
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis-insight-data:/data
    depends_on:
      - main-redis
      - sessions-redis
  object-storage-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    ports:
      - "9000:9000"    # API / S3 endpoint
      - "9001:9001"    # Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_CONSOLE_ADDRESS: ":9001"
    volumes:
      - object-storage-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  main-mongo-data:
  main-redis-data:
  sessions-redis-data:
  redis-insight-data:
  object-storage-minio-data: